name: glocal
description: Glocal - local voice clock, weather announcer, and reminder assistant.
publish_to: "none"
version: 1.0.6+7

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^17.1.0
  intl: ^0.20.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_tts: ^4.0.2
  speech_to_text: ^7.0.0
  geolocator: ^14.0.2
  http: ^1.2.2
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^21.0.0
  flutter_background_service: ^5.1.0
  timezone: ^0.11.0
  path_provider: ^2.1.4
  wakelock_plus: ^1.2.8
  flutter_secure_storage: ^10.0.0
  record: 6.2.0
  audioplayers: ^6.1.0
  eventide: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon_square.png
  min_sdk_android: 21



